<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Betting Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;font-size:14px}

header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:1.05rem;font-weight:700;color:#f0f6fc}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.btn:hover{background:#30363d;border-color:#58a6ff;color:#f0f6fc}
.btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn.primary:hover{background:#388bfd}
#last-sync{font-size:11px;color:#6e7681}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;padding:12px 20px;background:#161b22;border-bottom:1px solid #30363d}
.sc{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px 12px}
.sc-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.sc-val{font-size:1.3rem;font-weight:700;color:#f0f6fc}
.sc-val.g{color:#3fb950}.sc-val.r{color:#f85149}.sc-val.y{color:#d29922}
.sc-sub{font-size:11px;color:#6e7681;margin-top:2px}

/* CHARTS */
.charts-section{padding:12px 20px;background:#161b22;border-bottom:1px solid #30363d}
.charts-section h2{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.chart-box{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px}
.chart-box canvas{max-height:170px}
@media(max-width:600px){.charts-row{grid-template-columns:1fr}}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:10px 20px;border-bottom:1px solid #21262d;background:#0d1117}
.filt{background:transparent;border:1px solid #30363d;color:#8b949e;padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;transition:all .15s}
.filt:hover{border-color:#58a6ff;color:#58a6ff}
.filt.on{background:#1f6feb22;border-color:#1f6feb;color:#58a6ff}
.tb-sep{width:1px;height:20px;background:#21262d;margin:0 2px}
#search{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:6px;font-size:12px;width:150px;margin-left:auto}
#search:focus{outline:none;border-color:#58a6ff}

/* TABLE */
.table-wrap{overflow-x:auto;padding:0 20px 80px}
table{width:100%;border-collapse:collapse;min-width:800px}
th{background:#161b22;color:#8b949e;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:7px 8px;text-align:left;border-bottom:2px solid #21262d;white-space:nowrap;position:sticky;top:0;z-index:2}
th.r{text-align:right}th.c{text-align:center}
tr.mtr{border-bottom:1px solid #161b22;transition:background .1s}
tr.mtr:hover{background:#161b22}
td{padding:6px 8px;vertical-align:middle}

/* badges */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.scheduled{background:#1f2d45;color:#58a6ff}
.badge.live{background:#1f3320;color:#3fb950;animation:pulse 1.5s infinite}
.badge.finished{background:#21262d;color:#8b949e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* score */
.score{font-weight:700;font-size:13px;color:#f0f6fc;white-space:nowrap;}
.score.pending{font-size:11px;color:#6e7681;font-weight:400}

/* editable */
.ed{cursor:pointer;color:#58a6ff;border-bottom:1px dashed #1f6feb44;min-width:36px;display:inline-block;text-align:right}
.ed:empty::before{content:attr(data-ph);color:#2d3748;font-style:italic}
.ed:focus{outline:none;border-bottom:1px solid #58a6ff;color:#f0f6fc;background:#1a2540;border-radius:3px;padding:0 3px}

/* ticket select */
.tsel{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:2px 5px;border-radius:5px;font-size:12px;cursor:pointer}
.tsel.won{background:#1a3320;border-color:#3fb950;color:#3fb950}
.tsel.lost{background:#2d1515;border-color:#f85149;color:#f85149}
.tsel.open{background:#2d2510;border-color:#d29922;color:#d29922}

.payout{font-weight:700;color:#3fb950;text-align:right;white-space:nowrap}
.payout.zero{color:#2d3748}

.team{color:#e6edf3;white-space:nowrap}
.grp-tag{font-size:10px;color:#6e7681;margin-top:1px}
.vs{color:#6e7681;margin:0 3px;font-size:11px}

/* toast */
#toast{position:fixed;bottom:20px;right:20px;background:#1a3320;border:1px solid #3fb950;color:#3fb950;padding:7px 14px;border-radius:7px;font-size:12px;display:none;z-index:999;transition:opacity .3s}
</style>
</head>
<body>

<header>
  <h1>⚽ WC 2026 — Betting Tracker</h1>
  <div class="header-actions">
    <span id="last-sync"></span>
    <button class="btn" onclick="exportBets()">⬇ Export</button>
    <button class="btn" onclick="document.getElementById('imp').click()">⬆ Import</button>
    <input id="imp" type="file" accept=".json" style="display:none" onchange="importBets(event)">
    <button class="btn primary" onclick="loadAll(true)">↻ Osveži</button>
  </div>
</header>

<div class="summary">
  <div class="sc"><div class="sc-label">Uplaćeno</div><div class="sc-val" id="s-stake">—</div><div class="sc-sub">tiketi sa uplatom</div></div>
  <div class="sc"><div class="sc-label">Dobijeno</div><div class="sc-val g" id="s-return">—</div><div class="sc-sub">won tiketi</div></div>
  <div class="sc"><div class="sc-label">Profit</div><div class="sc-val" id="s-profit">—</div><div class="sc-sub">dobijeno − uplaćeno</div></div>
  <div class="sc"><div class="sc-label">Hit rate</div><div class="sc-val y" id="s-hit">—</div><div class="sc-sub" id="s-hit-sub">won / odigranih</div></div>
  <div class="sc"><div class="sc-label">ROI</div><div class="sc-val" id="s-roi">—</div><div class="sc-sub">povrat</div></div>
  <div class="sc"><div class="sc-label">Otvoreno</div><div class="sc-val y" id="s-open">—</div><div class="sc-sub">čekaju ishod</div></div>
</div>

<div class="charts-section">
  <h2>Analiza po danima</h2>
  <div class="charts-row">
    <div class="chart-box"><canvas id="chart-bar"></canvas></div>
    <div class="chart-box"><canvas id="chart-pie"></canvas></div>
  </div>
</div>

<div class="toolbar">
  <button class="filt on" onclick="setF('s','all',this)">Sve</button>
  <button class="filt" onclick="setF('s','scheduled',this)">Predstojeće</button>
  <button class="filt" onclick="setF('s','live',this)">Live</button>
  <button class="filt" onclick="setF('s','finished',this)">Završene</button>
  <div class="tb-sep"></div>
  <button class="filt on" onclick="setF('b','all',this)">Svi mečevi</button>
  <button class="filt" onclick="setF('b','with',this)">Sa uplatom</button>
  <button class="filt" onclick="setF('b','without',this)">Bez uplate</button>
  <input id="search" type="text" placeholder="Traži tim..." oninput="renderTable()">
</div>

<div class="table-wrap">
  <table>
    <thead><tr>
      <th>#</th>
      <th>Datum</th>
      <th>Vrijeme</th>
      <th>Utakmica</th>
      <th class="c">Rezultat</th>
      <th class="c">Status</th>
      <th class="r">Kvota</th>
      <th class="r">Uplata (din)</th>
      <th class="c">Tiket</th>
      <th class="r">Dobitak (din)</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="toast">✓ Sačuvano</div>

<script>
// ── GLOBALS ──────────────────────────────────────────────────────────────────
const FIXTURES_URL = "fixtures.json";
const RESULTS_URL  = "results.json";
const BETS_KEY     = "wc2026_bets_v2";  // localStorage key

// fd_id (string) → fixture data
let fixtures = {};
// fd_id (string) → result data  { status, score1, score2 }
let results  = {};
// fd_id (string) → bet data     { odds, stake, ticket }
let bets     = {};
// sorted array of fd_id strings (by utcDate)
let orderedIds = [];

let fStatus = "all";
let fBet    = "all";
let cBar = null, cPie = null;

// ── PERSISTENCE ──────────────────────────────────────────────────────────────
function loadBets(){
  try{ bets = JSON.parse(localStorage.getItem(BETS_KEY)||"{}"); }catch{ bets={}; }
}
function saveBets(){
  localStorage.setItem(BETS_KEY, JSON.stringify(bets));
  showToast();
}
function showToast(){
  const t=document.getElementById("toast");
  t.style.display="block"; t.style.opacity="1";
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.style.display="none",300);},2000);
}
function exportBets(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(bets,null,2)],{type:"application/json"}));
  a.download="wc2026_bets.json"; a.click();
}
function importBets(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{ bets=JSON.parse(ev.target.result); saveBets(); renderAll(); }
    catch{ alert("Neispravan JSON."); }
  };
  r.readAsText(f);
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadAll(manual=false){
  setLoading(true);
  try{
    const [fx, rs] = await Promise.all([
      fetch(FIXTURES_URL+"?t="+Date.now()).then(r=>{ if(!r.ok) throw new Error("fixtures.json nije pronađen"); return r.json(); }),
      fetch(RESULTS_URL +"?t="+Date.now()).then(r=>r.ok?r.json():{matches:{}}).catch(()=>({matches:{}}))
    ]);

    // fixtures: keyed by fd_id string
    fixtures = fx.matches || {};
    results  = rs.matches || {};

    // sort by utcDate
    orderedIds = Object.keys(fixtures).sort((a,b)=>{
      return (fixtures[a].utcDate||"") < (fixtures[b].utcDate||"") ? -1 : 1;
    });

    const sync = rs.generated_at ? new Date(rs.generated_at).toLocaleString("sr-Latn") : "—";
    document.getElementById("last-sync").textContent = "Sync: " + sync;

    renderAll();
  } catch(err){
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="10" style="text-align:center;padding:30px;color:#f85149">
        ${err.message}<br><small style="color:#6e7681">Pokreni bootstrap_fixtures.py prvo, pa commit-uj fixtures.json</small>
      </td></tr>`;
  } finally {
    setLoading(false);
  }
}

function setLoading(v){
  if(v) document.getElementById("tbody").innerHTML =
    `<tr><td colspan="10" style="text-align:center;padding:30px;color:#6e7681">Učitavam...</td></tr>`;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getStatus(fdId){
  const r = results[fdId];
  if(r) return r.status || "scheduled";  // "scheduled"|"live"|"finished"
  // fallback: calculate from utcDate
  const f = fixtures[fdId];
  if(!f) return "scheduled";
  const ko = new Date(f.utcDate).getTime();
  const now = Date.now();
  if(now >= ko + 3*3600*1000) return "finished";
  if(now >= ko - 15*60*1000)  return "live";
  return "scheduled";
}

function getScore(fdId){
  const r = results[fdId];
  if(!r || r.score1 === null || r.score1 === undefined) return null;
  return { s1: r.score1, s2: r.score2 };
}

function fmtDate(iso){
  if(!iso) return "—";
  return new Date(iso).toLocaleDateString("sr-Latn",{day:"2-digit",month:"short",timeZone:"UTC"});
}
function fmtTime(iso){
  if(!iso) return "—";
  return new Date(iso).toLocaleTimeString("sr-Latn",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Belgrade"});
}
function fmtGroup(g){
  // "GROUP_A" → "Gr. A"
  return g ? "Gr. " + g.replace("GROUP_","") : "";
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function setF(type, val, btn){
  if(type==="s") fStatus=val; else fBet=val;
  btn.closest(".toolbar").querySelectorAll(`.filt[onclick*="'${type}'"]`).forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  renderTable();
}
function passesFilter(fdId){
  const st = getStatus(fdId);
  if(fStatus !== "all" && st !== fStatus) return false;
  const b = bets[fdId]||{};
  if(fBet === "with"    && !b.stake) return false;
  if(fBet === "without" &&  b.stake) return false;
  const q = document.getElementById("search").value.toLowerCase().trim();
  if(q){
    const fx = fixtures[fdId]||{};
    if(!(fx.team1||"").toLowerCase().includes(q) && !(fx.team2||"").toLowerCase().includes(q)) return false;
  }
  return true;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){ renderTable(); updateSummary(); updateCharts(); }

function renderTable(){
  const tbody = document.getElementById("tbody");
  const visible = orderedIds.filter(passesFilter);
  if(!visible.length){
    tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:30px;color:#6e7681">Nema utakmica za odabrane filtere.</td></tr>`;
    return;
  }
  tbody.innerHTML = visible.map(id=>buildRow(id)).join("");
}

function buildRow(fdId){
  const fx  = fixtures[fdId] || {};
  const b   = bets[fdId]     || {};
  const sc  = getScore(fdId);
  const st  = getStatus(fdId);
  const odds  = b.odds  ? parseFloat(b.odds)  : null;
  const stake = b.stake ? parseFloat(b.stake) : null;
  const ticket = b.ticket || "";
  const payout = (ticket === "won" && odds && stake) ? (odds * stake) : null;
  const hasBet = !!stake;

  const badge = st==="live"
    ? `<span class="badge live">● LIVE</span>`
    : st==="finished"
    ? `<span class="badge finished">Završeno</span>`
    : `<span class="badge scheduled">Predstojeće</span>`;

  const scoreCell = sc
    ? `<span class="score">${sc.s1} – ${sc.s2}</span>`
    : `<span class="score pending">—</span>`;

  const ticketCell = hasBet
    ? `<select class="tsel ${ticket||"open"}" onchange="updateBet('${fdId}','ticket',this.value);this.className='tsel '+(this.value||'open')">
        <option value="">—</option>
        <option value="won"  ${ticket==="won" ?"selected":""}>✓ Won</option>
        <option value="lost" ${ticket==="lost"?"selected":""}>✗ Lost</option>
        <option value="open" ${ticket==="open"?"selected":""}>⏳ Open</option>
       </select>`
    : `<span style="color:#2d3748;font-size:11px">—</span>`;

  const payCell = payout
    ? `<span class="payout">+${payout.toFixed(2)}</span>`
    : `<span class="payout zero">—</span>`;

  return `<tr class="mtr" data-id="${fdId}">
    <td style="color:#6e7681;font-size:11px">${fx.seq||""}</td>
    <td style="color:#8b949e;white-space:nowrap">${fmtDate(fx.utcDate)}</td>
    <td style="color:#8b949e;white-space:nowrap">${fmtTime(fx.utcDate)}</td>
    <td>
      <div><span class="team">${fx.team1||"TBD"}</span><span class="vs">vs</span><span class="team">${fx.team2||"TBD"}</span></div>
      <div class="grp-tag">${fmtGroup(fx.group)} &bull; ${fx.venue||""}</div>
    </td>
    <td class="c" style="text-align: center;">${scoreCell}</td>
    <td class="c" style="text-align: center;">${badge}</td>
    <td class="r" style="text-align: right;">
      <span class="ed" contenteditable="true" data-ph="1.00"
        onblur="updateBet('${fdId}','odds',this.innerText)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${b.odds||""}</span>
    </td>
    <td class="r" style="text-align: right;">
      <span class="ed" contenteditable="true" data-ph="0.00"
        onblur="updateBet('${fdId}','stake',this.innerText)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${b.stake||""}</span>
    </td>
    <td class="c" style="text-align: center;">${ticketCell}</td>
    <td class="r" style="text-align: right;">${payCell}</td>
  </tr>`;
}

// ── BET UPDATE ────────────────────────────────────────────────────────────────
function updateBet(fdId, field, raw){
  if(!bets[fdId]) bets[fdId]={};
  const v = raw.trim().replace(",",".");
  if(field==="odds"||field==="stake"){
    const n=parseFloat(v);
    bets[fdId][field] = (!isNaN(n)&&n>0) ? String(n) : "";
  } else {
    bets[fdId][field] = v;
  }
  saveBets();
  // patch just payout cell
  const tr = document.querySelector(`tr[data-id="${fdId}"]`);
  if(tr){
    const b2=bets[fdId]||{};
    const p=(b2.ticket==="won"&&b2.odds&&b2.stake)?(parseFloat(b2.odds)*parseFloat(b2.stake)):null;
    tr.querySelector("td:last-child").innerHTML=p
      ?`<span class="payout">+${p.toFixed(2)}</span>`
      :`<span class="payout zero">—</span>`;
  }
  updateSummary(); updateCharts();
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function updateSummary(){
  let totalStake=0, totalReturn=0, wonC=0, playedC=0, openC=0;
  orderedIds.forEach(id=>{
    const b=bets[id]||{};
    if(!b.stake) return;
    const s=parseFloat(b.stake)||0;
    totalStake+=s;
    if(b.ticket==="won"){
      wonC++; playedC++;
      totalReturn+=(parseFloat(b.odds)||1)*s;
    } else if(b.ticket==="lost"){
      playedC++;
    } else {
      openC++;
    }
  });
  const profit = totalReturn - totalStake;
  const roi    = totalStake>0?((profit/totalStake)*100):null;
  const hitR   = playedC>0?Math.round((wonC/playedC)*100):null;

  set("s-stake",  totalStake>0?totalStake.toFixed(2)+" din":"—");
  set("s-return", totalReturn>0?totalReturn.toFixed(2)+" din":"—");
  const pe=document.getElementById("s-profit");
  pe.textContent=totalStake>0?(profit>=0?"+":"")+profit.toFixed(2)+" din":"—";
  pe.className="sc-val "+(profit>0?"g":profit<0?"r":"");
  set("s-hit", hitR!==null?hitR+"%":"—");
  document.getElementById("s-hit-sub").textContent=`${wonC} / ${playedC} odigranih`;
  set("s-open", openC||"—");
  const re=document.getElementById("s-roi");
  re.textContent=roi!==null?(roi>=0?"+":"")+roi.toFixed(1)+"%":"—";
  re.className="sc-val "+(roi>0?"g":roi<0?"r":"y");
}
function set(id,v){ document.getElementById(id).textContent=v; }

// ── CHARTS ────────────────────────────────────────────────────────────────────
function updateCharts(){
  const byDate={};
  orderedIds.forEach(id=>{
    const b=bets[id]||{};
    if(!b.stake) return;
    const d=(fixtures[id]||{}).utcDate||"";
    const day=d.substring(0,10);
    if(!byDate[day]) byDate[day]={stake:0,ret:0,wonC:0,playedC:0};
    const s=parseFloat(b.stake)||0;
    byDate[day].stake+=s;
    if(b.ticket==="won"){ byDate[day].ret+=(parseFloat(b.odds)||1)*s; byDate[day].wonC++; byDate[day].playedC++; }
    else if(b.ticket==="lost"){ byDate[day].playedC++; }
  });

  const days=Object.keys(byDate).sort();
  const labels=days.map(d=>new Date(d+"T12:00Z").toLocaleDateString("en",{day:"2-digit",month:"short"}));
  const stakes=days.map(d=>+byDate[d].stake.toFixed(2));
  const rets  =days.map(d=>+byDate[d].ret.toFixed(2));
  const profs =days.map(d=>+(byDate[d].ret-byDate[d].stake).toFixed(2));

  const base={responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:"#8b949e",font:{size:11},padding:8}}}};

  if(cBar) cBar.destroy();
  cBar=new Chart(document.getElementById("chart-bar"),{
    type:"bar",
    data:{labels:labels.length?labels:["—"],datasets:[
      {label:"Uplaćeno",data:stakes,backgroundColor:"#1f6feb55",borderColor:"#1f6feb",borderWidth:1},
      {label:"Dobijeno",data:rets,  backgroundColor:"#3fb95055",borderColor:"#3fb950",borderWidth:1},
      {label:"Profit",  data:profs, type:"line",borderColor:"#d29922",borderWidth:2,pointRadius:3,fill:false,tension:.3}
    ]},
    options:{...base,scales:{
      x:{ticks:{color:"#6e7681",font:{size:10}},grid:{color:"#21262d"}},
      y:{ticks:{color:"#6e7681",font:{size:10}},grid:{color:"#21262d"}}
    }}
  });

  const allPlayed=days.reduce((s,d)=>s+byDate[d].playedC,0);
  const allWon   =days.reduce((s,d)=>s+byDate[d].wonC,0);
  const missed   =allPlayed-allWon;
  const openC    =orderedIds.filter(id=>{ const b=bets[id]||{}; return b.stake&&(!b.ticket||b.ticket==="open"); }).length;

  if(cPie) cPie.destroy();
  cPie=new Chart(document.getElementById("chart-pie"),{
    type:"doughnut",
    data:{
      labels:["Pogođeno","Promašeno","Otvoreno"],
      datasets:[{data:[allWon,missed,openC],
        backgroundColor:["#3fb95077","#f8514977","#d2992277"],
        borderColor:["#3fb950","#f85149","#d29922"],borderWidth:1}]
    },
    options:{...base,cutout:"65%",plugins:{
      legend:{position:"bottom",labels:{color:"#8b949e",font:{size:11},padding:8}},
      tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}`}}
    }}
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadBets();
loadAll();
setInterval(()=>loadAll(),5*60*1000);  // auto-refresh svake 5 min
</script>
