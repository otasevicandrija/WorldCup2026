name: Update WC 2026 Results

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Run bootstrap_fixtures.py first? (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap fixtures (samo ručno)
        if: github.event.inputs.bootstrap == 'yes'
        env:
          FD_API_TOKEN: ${{ secrets.FD_API_TOKEN }}
        run: python bootstrap_fixtures.py

      - name: Update results
        env:
          FD_API_TOKEN: ${{ secrets.FD_API_TOKEN }}
        run: python update_results.py

      - name: Commit ako ima promjena
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures.json results.json
          if git diff --cached --quiet; then
            echo "Nema promjena."
          else
            git commit -m "chore: update results $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi