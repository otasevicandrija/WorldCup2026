name: Update World Cup Results

on:
  schedule:
    - cron: '*/30 * * * *'   # svaki 30 minuta
  workflow_dispatch:           # manual trigger iz GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_results.py

      - name: Commit results if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update results $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
